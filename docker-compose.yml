version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: ats_redis_broker
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: ats_django_api
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    # ADD THIS ENVIRONMENT BLOCK:
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis

  worker:
    build: .
    container_name: ats_celery_worker
    command: celery -A core worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    # ADD THIS ENVIRONMENT BLOCK:
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis